<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPL BROADCAST PRO | DEVDAS MALEKAR EDITION</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Orbitron:wght@400;700;900&family=Teko:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* =================================================================================
           1. ADVANCED DESIGN SYSTEM & UI VARIABLES
           ================================================================================= */
        :root {
            --primary-bg: #1a0633; /* Professional Dark Purple */
            --accent-pink: #e91e63;
            --gold-accent: #fbbf24;
            --pure-white: #ffffff;
            --text-gray: #ccc;
            --font-head: 'Orbitron', sans-serif;
            --font-body: 'Exo 2', sans-serif;
            --font-stat: 'Teko', sans-serif;
        }

        * { box-sizing: border-box; user-select: none; }

        body {
            margin: 0;
            padding: 0;
            background-color: #0c0c0c; /* For testing; usually transparent in OBS */
            font-family: var(--font-body);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
        }

        /* =================================================================================
           2. PROFESSIONAL SCORE BUG (OVERLAY) - THE NEW DESIGN
           ================================================================================= */
        .overlay-wrapper {
            position: fixed;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 100;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        .score-bug {
            display: flex;
            height: 70px;
            background: var(--pure-white);
            border-radius: 4px;
            overflow: hidden;
            animation: slideUp 1s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(150px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Batting Side (Left) */
        .seg-batting {
            background: var(--primary-bg);
            color: white;
            min-width: 320px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            clip-path: polygon(0% 0%, 92% 0%, 100% 50%, 92% 100%, 0% 100%);
            position: relative;
        }

        .bat-players-box { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .bat-p-row { display: flex; justify-content: space-between; align-items: center; margin: 2px 0; transition: 0.3s; }
        .bat-p-name { font-weight: 700; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }
        .bat-p-score { font-family: var(--font-head); color: var(--gold-accent); font-size: 1.1rem; }
        .bat-p-score span { font-size: 0.7rem; color: #aaa; margin-left: 4px; }
        
        /* Striker Indicator */
        .is-striker { color: var(--gold-accent) !important; position: relative; }
        .is-striker::before { content: '🏏'; position: absolute; left: -20px; font-size: 0.7rem; }

        /* Match Info (Center) */
        .seg-info {
            background: white;
            color: black;
            min-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
        }

        .match-title { font-size: 0.7rem; font-weight: 900; color: #555; text-transform: uppercase; margin-bottom: 2px; }
        .teams-vs { font-size: 1.1rem; font-weight: 400; margin-bottom: 4px; }
        .teams-vs b { font-weight: 900; color: #000; font-size: 1.3rem; }

        .score-box { display: flex; align-items: center; gap: 12px; }
        .main-score-pill { 
            background: var(--accent-pink); 
            color: white; 
            padding: 2px 18px; 
            border-radius: 25px; 
            font-family: var(--font-head);
            font-size: 2rem;
            line-height: 1;
        }
        .overs-display { font-family: var(--font-head); font-size: 1.2rem; font-weight: 700; color: #333; }

        .extra-line { font-family: var(--font-stat); font-size: 1.2rem; color: #e91e63; font-weight: 700; text-transform: uppercase; margin-top: 2px; }

        /* Bowling Side (Right) */
        .seg-bowling {
            background: var(--primary-bg);
            color: white;
            min-width: 320px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            clip-path: polygon(8% 0%, 100% 0%, 100% 100%, 8% 100%, 0% 50%);
        }

        .bw-data { text-align: right; margin-right: 15px; }
        .bw-name { display: block; font-weight: 700; text-transform: uppercase; font-size: 0.9rem; }
        .bw-timeline { display: flex; gap: 4px; margin-top: 4px; }
        .ball-dot { 
            width: 18px; height: 18px; border-radius: 50%; background: #333; border: 1px solid #555;
            display: flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: bold;
        }
        .bw-figs { font-family: var(--font-head); font-size: 1.6rem; color: var(--gold-accent); border-left: 2px solid #444; padding-left: 15px; }

        /* Timeline Ball Colors */
        .b-4 { background: var(--gold-accent) !important; color: black; }
        .b-6 { background: var(--accent-pink) !important; }
        .b-w { background: white !important; color: black; }

        /* =================================================================================
           3. ADMIN PANEL DESIGN (UNCHANGED FUNCTIONALITY, NEW LOOK)
           ================================================================================= */
        .admin-dashboard {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background: #111;
            border-radius: 15px;
            display: none; /* Hidden until Auth */
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .panel-box { background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #333; }
        .panel-box h3 { border-bottom: 2px solid var(--accent-pink); padding-bottom: 10px; font-family: var(--font-head); font-size: 0.9rem; }
        
        .btn-ctrl { 
            width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 5px; 
            cursor: pointer; font-family: var(--font-head); font-weight: 900; transition: 0.2s;
        }
        .c-run { background: #2563eb; color: white; }
        .c-4 { background: var(--gold-accent); color: black; }
        .c-6 { background: var(--accent-pink); color: white; }
        .c-w { background: white; color: black; }
        .c-util { background: #444; color: #ccc; }

        input { width: 100%; padding: 8px; margin: 5px 0; background: #000; border: 1px solid #333; color: white; border-radius: 4px; }

        /* Auth Screen */
        .auth-screen {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="authScreen" class="auth-screen">
        <h2 style="font-family: var(--font-head); color: var(--gold-accent);">DEVDAS MALEKAR | CONTROL</h2>
        <input type="password" id="authKey" style="width: 250px; text-align: center; letter-spacing: 5px;" placeholder="ENTER KEY">
        <button onclick="unlockSystem()" class="btn-ctrl c-run" style="width: 250px;">UNLOCK BROADCAST</button>
    </div>

    <div class="overlay-wrapper">
        <div class="score-bug">
            <div class="seg-batting">
                <div class="bat-players-box">
                    <div class="bat-p-row" id="disp-p1-row">
                        <span class="bat-p-name" id="disp-p1-name">PLAYER 1</span>
                        <span class="bat-p-score" id="disp-p1-s">0 <span>(0)</span></span>
                    </div>
                    <div class="bat-p-row" id="disp-p2-row">
                        <span class="bat-p-name" id="disp-p2-name">PLAYER 2</span>
                        <span class="bat-p-score" id="disp-p2-s">0 <span>(0)</span></span>
                    </div>
                </div>
            </div>

            <div class="seg-info">
                <div class="match-title" id="disp-tour">TOURNAMENT NAME</div>
                <div class="teams-vs" id="disp-teams">TEAM A v TEAM B</div>
                <div class="score-box">
                    <div class="main-score-pill" id="disp-total">0-0</div>
                    <div class="overs-display" id="disp-overs">0.0</div>
                </div>
                <div class="extra-line" id="disp-extra">TARGET: 100</div>
            </div>

            <div class="seg-bowling">
                <div class="bw-data">
                    <span class="bw-name" id="disp-bw-name">BOWLER NAME</span>
                    <div class="bw-timeline" id="ball-timeline">
                        </div>
                </div>
                <div class="bw-figs" id="disp-bw-figs">0-0</div>
            </div>
        </div>
    </div>

    <div class="admin-dashboard" id="adminPanel">
        <div class="panel-box">
            <h3>MATCH SETUP</h3>
            Tournament: <input type="text" id="in-tour" oninput="syncManual()">
            Team 1: <input type="text" id="in-t1" oninput="syncManual()">
            Team 2: <input type="text" id="in-t2" oninput="syncManual()">
            Target: <input type="number" id="in-target" oninput="syncManual()">
            Batting Team (t1/t2): <input type="text" id="in-bat-team" oninput="syncManual()">
        </div>

        <div class="panel-box">
            <h3>SCORING PAD</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <button class="btn-ctrl c-run" onclick="scoreRun(0)">DOT</button>
                <button class="btn-ctrl c-run" onclick="scoreRun(1)">1 RUN</button>
                <button class="btn-ctrl c-run" onclick="scoreRun(2)">2 RUNS</button>
                <button class="btn-ctrl c-run" onclick="scoreRun(3)">3 RUNS</button>
                <button class="btn-ctrl c-4" onclick="scoreRun(4)">4 (FOUR)</button>
                <button class="btn-ctrl c-6" onclick="scoreRun(6)">6 (SIX)</button>
                <button class="btn-ctrl c-w" onclick="scoreWicket()">WICKET</button>
                <button class="btn-ctrl c-util" onclick="scoreExtra('WD')">WD</button>
                <button class="btn-ctrl c-util" onclick="undo()">UNDO</button>
                <button class="btn-ctrl c-util" onclick="swapStrike()">SWAP</button>
            </div>
        </div>

        <div class="panel-box">
            <h3>PLAYER EDIT</h3>
            Striker Name: <input type="text" id="in-p1" oninput="syncManual()">
            Non-Striker: <input type="text" id="in-p2" oninput="syncManual()">
            Bowler Name: <input type="text" id="in-bw" oninput="syncManual()">
            <br><br>
            <button class="btn-ctrl c-run" style="background: green;" onclick="updateFirebase()">PUSH TO CLOUD</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        /* =================================================================================
           JAVASCRIPT LOGIC ENGINE (ALL FEATURES PRESERVED & ENHANCED)
           ================================================================================= */

        // 1. STATE INITIALIZATION
        let state = {
            meta: { tour: "CHHOTU PREMIER LEAGUE", t1: "IND", t2: "BAN", batting: "t1", target: 0 },
            score: { runs: 0, wkts: 0, overs: 0, balls: 0 },
            p1: { name: "PLAYER 1", runs: 0, balls: 0 },
            p2: { name: "PLAYER 2", runs: 0, balls: 0 },
            bw: { name: "BOWLER", runs: 0, wkts: 0, overs: 0, balls: 0 },
            strike: 1, // 1 or 2
            timeline: [], // Current Over
            history: [] // For Undo
        };

        // 2. FIREBASE CONFIG (ADD YOUR DETAILS HERE)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 3. AUTH SYSTEM
        function unlockSystem() {
            const key = document.getElementById('authKey').value;
            if(key === "Chhotu@8718") {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'grid';
                init();
            } else { alert("ACCESS DENIED"); }
        }

        // 4. CORE FUNCTIONS
        function saveToHistory() {
            state.history.push(JSON.parse(JSON.stringify(state)));
            if(state.history.length > 10) state.history.shift();
        }

        function scoreRun(runs) {
            saveToHistory();
            state.score.runs += runs;
            state.bw.runs += runs;
            
            if(state.strike === 1) { state.p1.runs += runs; state.p1.balls++; }
            else { state.p2.runs += runs; state.p2.balls++; }

            if(runs % 2 !== 0) swapStrikeLogic();
            handleBall(runs);
        }

        function scoreWicket() {
            saveToHistory();
            state.score.wkts++;
            state.bw.wkts++;
            if(state.strike === 1) { state.p1.balls++; state.p1.name = "NEW BATSMAN"; state.p1.runs = 0; state.p1.balls = 0; }
            else { state.p2.balls++; state.p2.name = "NEW BATSMAN"; state.p2.runs = 0; state.p2.balls = 0; }
            handleBall('W');
        }

        function scoreExtra(type) {
            saveToHistory();
            state.score.runs += 1;
            state.bw.runs += 1;
            render();
            updateFirebase();
        }

        function handleBall(val) {
            state.score.balls++;
            state.bw.balls++;
            state.timeline.push(val);

            if(state.score.balls >= 6) {
                state.score.overs++;
                state.score.balls = 0;
                state.bw.overs++;
                state.bw.balls = 0;
                state.timeline = [];
                swapStrikeLogic();
            }
            render();
            updateFirebase();
        }

        function swapStrike() {
            saveToHistory();
            swapStrikeLogic();
            render();
            updateFirebase();
        }

        function swapStrikeLogic() { state.strike = state.strike === 1 ? 2 : 1; }

        function undo() {
            if(state.history.length > 0) {
                state = state.history.pop();
                render();
                updateFirebase();
            }
        }

        // 5. RENDERING ENGINE (THE NEXT LEVEL PART)
        function render() {
            // Textual Updates
            document.getElementById('disp-tour').innerText = state.meta.tour;
            document.getElementById('disp-total').innerText = `${state.score.runs}-${state.score.wkts}`;
            document.getElementById('disp-overs').innerText = `${state.score.overs}.${state.score.balls}`;
            
            // Bold Team Logic
            const t1 = state.meta.t1;
            const t2 = state.meta.t2;
            if(state.meta.batting === 't1') {
                document.getElementById('disp-teams').innerHTML = `<b>${t1}</b> v ${t2}`;
            } else {
                document.getElementById('disp-teams').innerHTML = `${t1} v <b>${t2}</b>`;
            }

            // Players
            document.getElementById('disp-p1-name').innerText = state.p1.name;
            document.getElementById('disp-p1-s').innerHTML = `${state.p1.runs} <span>(${state.p1.balls})</span>`;
            document.getElementById('disp-p2-name').innerText = state.p2.name;
            document.getElementById('disp-p2-s').innerHTML = `${state.p2.runs} <span>(${state.p2.balls})</span>`;

            // Striker Highlight
            document.getElementById('disp-p1-name').classList.toggle('is-striker', state.strike === 1);
            document.getElementById('disp-p2-name').classList.toggle('is-striker', state.strike === 2);

            // Bowler
            document.getElementById('disp-bw-name').innerText = state.bw.name;
            document.getElementById('disp-bw-figs').innerText = `${state.bw.wkts}-${state.bw.runs}`;

            // Timeline
            const tl = document.getElementById('ball-timeline');
            tl.innerHTML = '';
            state.timeline.forEach(b => {
                const d = document.createElement('div');
                d.className = `ball-dot b-${b}`;
                d.innerText = b;
                tl.appendChild(d);
            });

            // Target/Equation
            if(state.meta.target > 0) {
                const need = state.meta.target - state.score.runs;
                document.getElementById('disp-extra').innerText = `NEED ${need} RUNS`;
            } else {
                document.getElementById('disp-extra').innerText = `1ST INNINGS`;
            }

            // Sync Admin Inputs
            document.getElementById('in-tour').value = state.meta.tour;
            document.getElementById('in-t1').value = state.meta.t1;
            document.getElementById('in-t2').value = state.meta.t2;
            document.getElementById('in-p1').value = state.p1.name;
            document.getElementById('in-p2').value = state.p2.name;
            document.getElementById('in-bw').value = state.bw.name;
        }

        // 6. SYNC & CLOUD
        function syncManual() {
            state.meta.tour = document.getElementById('in-tour').value;
            state.meta.t1 = document.getElementById('in-t1').value;
            state.meta.t2 = document.getElementById('in-t2').value;
            state.meta.target = parseInt(document.getElementById('in-target').value) || 0;
            state.meta.batting = document.getElementById('in-bat-team').value;
            state.p1.name = document.getElementById('in-p1').value;
            state.p2.name = document.getElementById('in-p2').value;
            state.bw.name = document.getElementById('in-bw').value;
            render();
        }

        function updateFirebase() {
            db.ref('broadcast_state').set(state);
        }

        function init() {
            // Start listening for cloud changes
            db.ref('broadcast_state').on('value', (snap) => {
                const cloudData = snap.val();
                if(cloudData) {
                    state = cloudData;
                    render();
                }
            });
        }
    </script>
</body>
</html>
